<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Restoration of your branding title */
    .main-title {
      text-align: center;
      color: #282d29;
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 5px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    /* Keep the confetti animation working */
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="main-title">DSA Reviser</div>

  <div id="list">
    </div>
  
  <script src="popup.js"></script>
</body>
</html>
